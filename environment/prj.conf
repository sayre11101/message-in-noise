# --- Floating Point & Math Support ---
# Required for 64-bit double precision math and complex trigonometry (sin, fmod)
CONFIG_FPU=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# --- Memory Configuration ---
# Required to prevent a stack overflow from the 4KB adc_buffer allocated in main()
CONFIG_MAIN_STACK_SIZE=8192